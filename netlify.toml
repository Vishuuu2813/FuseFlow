[build]
  base = "fuseflow"
  publish = "fuseflow/dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Use relative path — Netlify proxies /api/* to Railway internally
  VITE_API_URL = "/api"
  # Socket connects to Netlify domain (same origin = no DNS issues)
  VITE_SOCKET_URL = "https://splendorous-concha-a6cb6b.netlify.app"

# ── Proxy: REST API → Railway ──────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://fuseflow-production.up.railway.app/api/:splat"
  status = 200
  force = true

# ── Proxy: Socket.IO → Railway ─────────────────────────────────────
[[redirects]]
  from = "/socket.io/*"
  to = "https://fuseflow-production.up.railway.app/socket.io/:splat"
  status = 200
  force = true

# ── SPA fallback (must be last) ────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
